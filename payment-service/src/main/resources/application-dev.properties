# H2 Database
spring.datasource.url=jdbc:h2:mem:paymentdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update

external.provider.base-url=http://localhost:9561

# Resilience4j
resilience4j.circuitbreaker.instances.externalProvider.slidingWindowSize=5
resilience4j.retry.instances.externalProvider.maxAttempts=3
resilience4j.timelimiter.instances.externalProvider.timeout-duration=2s

# Logging
logging.level.com.wallet.service=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE