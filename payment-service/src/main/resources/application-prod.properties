spring.datasource.url=jdbc:postgresql://localhost:5432/walletdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=validate

external.provider.base-url=http://external-provider

resilience4j.circuitbreaker.instances.externalProvider.slidingWindowSize=5
resilience4j.retry.instances.externalProvider.maxAttempts=3
resilience4j.timelimiter.instances.externalProvider.timeout-duration=2s