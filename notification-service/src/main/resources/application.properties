# Configuração do RabbitMQ
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:test}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:test}

# Fila de transações
app.rabbitmq.queue=${TRANSACTION_QUEUE:transactions.queue}

# Porta do servidor
server.port=8081

# Exposição dos endpoints de gerenciamento
management.endpoints.web.exposure.include=*

# OTLP (OpenTelemetry) - métricas
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/metrics}
