version: '3.8'

services:
  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    image: wallet-service:latest
    container_name: wallet-service-prod
    ports:
      - "18080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/walletdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=produser
      - SPRING_RABBITMQ_PASSWORD=prodpwd
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wallet-network-prod
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    image: notification-service:latest
    container_name: notification-service-prod
    ports:
      - "18081:8081"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=produser
      - SPRING_RABBITMQ_PASSWORD=prodpwd
      - MANAGEMENT_OTLP_METRICS_EXPORT_ENABLED=false
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - wallet-network-prod
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    image: payment-service:latest
    container_name: payment-service-prod
    ports:
      - "18082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/walletdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - EXTERNAL_PROVIDER_BASE_URL=http://external-provider
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=produser
      - SPRING_RABBITMQ_PASSWORD=prodpwd
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - wallet-network-prod
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: wallet-postgres-prod
    ports:
      - "15432:5432"
    environment:
      - POSTGRES_DB=walletdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d walletdb || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - wallet-network-prod
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: wallet-rabbit-prod
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=produser
      - RABBITMQ_DEFAULT_PASS=prodpwd
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - wallet-network-prod
    restart: unless-stopped

networks:
  wallet-network-prod:
    driver: bridge

volumes:
  postgres-data-prod:
